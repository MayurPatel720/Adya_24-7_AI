services:
  - type: web
    name: adya-24-7-ai
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OPENCLAW_GATEWAY_URL
        sync: false
      - key: OPENCLAW_GATEWAY_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_BUSINESS_NAME
        value: ADYAWEAR
      - key: WHATSAPP_SENDER_PHONE
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ADYAWEAR_STORE_URL
        value: https://www.adyawear.in
      - key: ADYAWEAR_STORE_API
        value: https://www.adyawear.in/api
      - key: FOLLOWUP_DELAY_DAYS
        value: 3
      - key: REVIEW_REQUEST_DELAY_DAYS
        value: 5
